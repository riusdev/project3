<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultra Analytics Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
transition:.3s;
}

/* LIGHT MODE */

body.light{
background:#f1f5f9;
color:#020617;
}

body.light .card,
body.light .chart-box,
body.light .activity,
body.light .progress-box{
background:white;
color:#020617;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#020617;
height:100vh;
padding:30px 20px;
transition:.3s;
}

.sidebar.collapsed{
width:70px;
}

.sidebar h2{
margin-bottom:40px;
}

.sidebar a{
display:block;
color:#cbd5f5;
text-decoration:none;
margin-bottom:20px;
transition:.3s;
}

.sidebar a:hover{
color:white;
transform:translateX(5px);
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:30px;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:20px;
border-radius:14px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:14px;
opacity:.7;
}

.card p{
font-size:28px;
margin-top:10px;
font-weight:700;
}

/* CHART */

.chart-box{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:14px;
margin-bottom:30px;
}

/* PROGRESS */

.progress-box{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:14px;
margin-bottom:30px;
}

.progress{
background:#334155;
height:8px;
border-radius:10px;
margin:10px 0;
overflow:hidden;
}

.progress span{
display:block;
height:100%;
background:#38bdf8;
}

/* ACTIVITY */

.activity{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:14px;
}

.activity-item{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:14px;
}

.activity-item:last-child{
border:none;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar">

<h2>Dash</h2>

<a href="#">Overview</a>
<a href="#">Analytics</a>
<a href="#">Customers</a>
<a href="#">Revenue</a>
<a href="#">Settings</a>

</div>

<div class="main">

<div class="topbar">

<h1>Analytics Overview</h1>

<div>
<button onclick="toggleSidebar()">☰</button>
<button onclick="toggleTheme()">🌙</button>
</div>

</div>

<div class="cards">

<div class="card">
<h3>Total Users</h3>
<p class="counter" data-target="12450">0</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p class="counter" data-target="8240">0</p>
</div>

<div class="card">
<h3>Conversions</h3>
<p class="counter" data-target="1120">0</p>
</div>

<div class="card">
<h3>Bounce Rate</h3>
<p>32%</p>
</div>

</div>

<div class="chart-box">

<h3 style="margin-bottom:20px;">Traffic Analytics</h3>

<canvas id="chart"></canvas>

</div>

<div class="progress-box">

<h3>Marketing Channels</h3>

<p>SEO</p>
<div class="progress"><span style="width:70%"></span></div>

<p>Social Media</p>
<div class="progress"><span style="width:55%"></span></div>

<p>Ads</p>
<div class="progress"><span style="width:40%"></span></div>

</div>

<div class="activity">

<h3 style="margin-bottom:15px;">Recent Activity</h3>

<div class="activity-item">New user registered</div>
<div class="activity-item">Payment received $240</div>
<div class="activity-item">New order placed</div>
<div class="activity-item">User upgraded plan</div>

</div>

</div>

<script>

/* CHART */

new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:["Jan","Feb","Mar","Apr","May","Jun"],
datasets:[{
label:"Visitors",
data:[1200,1900,3000,5000,4200,6100],
borderColor:"#38bdf8",
backgroundColor:"rgba(56,189,248,0.2)",
fill:true,
tension:.4
}]
},
options:{
plugins:{legend:{display:false}}
}
});

/* COUNTER */

const counters=document.querySelectorAll(".counter");

counters.forEach(counter=>{
const update=()=>{
const target=+counter.getAttribute("data-target");
const count=+counter.innerText;

const speed=200;
const inc=target/speed;

if(count<target){
counter.innerText=Math.ceil(count+inc);
setTimeout(update,10);
}else{
counter.innerText=target;
}
};
update();
});

/* THEME */

function toggleTheme(){
document.body.classList.toggle("light");
}

/* SIDEBAR */

function toggleSidebar(){
document.getElementById("sidebar").classList.toggle("collapsed");
}

</script>

</body>
</html>
